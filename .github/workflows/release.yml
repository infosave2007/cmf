name: Release binaries

# On every version tag, build the `cortiq` CLI for the common desktop/server
# targets and attach the archives to the GitHub Release — so people can use it
# without a Rust toolchain.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p cortiq-cli --target ${{ matrix.target }}
      - name: Package
        run: |
          bindir="target/${{ matrix.target }}/release"
          tar -C "$bindir" -czf "cortiq-${{ matrix.target }}.tar.gz" cortiq
          shasum -a 256 "cortiq-${{ matrix.target }}.tar.gz" > "cortiq-${{ matrix.target }}.tar.gz.sha256"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cortiq-${{ matrix.target }}.tar.gz
            cortiq-${{ matrix.target }}.tar.gz.sha256
